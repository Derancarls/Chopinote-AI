# Chopinote-AI 生成配置 v0.2.4
# ────────────────────────────────────────────
# 此文件中的值即为默认值。CLI 参数和 --preset 可临时覆盖。
# 编辑保存后，下次运行 `chopin input.musicxml` 自动生效。
#
# 优先级链: CLI 参数 > --preset > 此配置文件 > 内置默认值
#
# 使用方式:
#   1. 直接运行 → 自动加载此文件
#      chopin best.pt input.musicxml
#   2. 指定配置文件
#      chopin best.pt input.musicxml --config my_settings.yaml
#   3. 配置文件 + CLI 临时覆盖
#      chopin best.pt input.musicxml --temp 1.5 --max-bars 64
#
# 自动搜索路径（按优先级）:
#   - ./chopinote_config.yaml
#   - ~/.chopinote/config.yaml
#   - (包内置 generation_config.yaml)


# ── 核心采样参数 ──────────────────────────────────────────────

temperature: 1.0
# 采样温度。越高随机性越强，越低越保守。
#   范围: 0.1 ~ 2.5 (默认: 1.0)
#   调高 → 更多创意/变化，可能不连贯
#   调低 → 更稳定/可预测，可能重复

top_k: 20
# 每步只从概率最高的 k 个 token 中采样。
#   范围: 1 ~ 100 (默认: 20)
#   调高 → 更多多样性，可能出格
#   调低 → 更安全/收敛

max_bars: 32
# 续写的小节数。
#   范围: 1 ~ 256 (默认: 32)
#   调高 → 更长乐曲
#   调低 → 短片段

complexity: 5
# 音乐的复杂/密集程度。控制装饰音、力度变化、节奏密度。
#   范围: 0 ~ 10 (默认: 5)
#   调高 → 更多装饰音/密集织体/力度变化
#   调低 → 稀疏/简约风格

# ── 锁定模式 ──────────────────────────────────────────────────

lock_key: true
# 锁定调性。true=保持种子调性不转调，false=允许转调。
#   调高(true) → 调性稳定统一
#   调低(false) → 更多调性变化，可能不和谐

lock_time: true
# 锁定拍号。true=保持种子拍号，false=允许变化。

lock_tempo: true
# 锁定速度。true=保持种子 BPM，false=允许变速。

lock_program: true
# 锁定乐器。true=使用种子乐器，false=允许切换。
#   调低(false) → 不同乐器混合，更丰富

# ── 高级约束 ──────────────────────────────────────────────────

rest_penalty: 0.0
# 休止符惩罚。值越大模型越不愿意生成休止符。
#   范围: 0.0 ~ 10.0 (默认: 0.0)
#   调高 → 音符更密集连续
#   调低 → 更多呼吸感/留白

max_polyphony: 10
# 同一时刻最多发音数。
#   范围: 1 ~ 20 (默认: 10)
#   调高 → 更丰满的和声织体
#   调低 → 更清晰的单声部线条

key_bias_strength: 2.0
# 调性音高偏置强度。控制音符是否严格在调内。
#   范围: 0.0 ~ 5.0 (默认: 2.0)
#   调高 → 音符更严格符合调性
#   调低 → 允许更多变化音/半音

prog_switch_strength: 1.0
# 乐器切换偏置强度。值越高模型越倾向于换乐器。
#   范围: 0.0 ~ 5.0 (默认: 1.0)
#   调高 → 乐段间乐器变化频繁
#   调低 → 稳定使用同一种乐器

prog_switch_interval: 12
# 乐器切换最少间隔（按音符数计）。
#   范围: 1 ~ 128 (默认: 12)
#   调高 → 乐器切换频率低
#   调低 → 切换更频繁

# ── 段落感知生成 ──────────────────────────────────────────────

section_aware: false
# 启用段落感知两阶段生成（结构规划→音符填充）。
#   true=启用，false=传统单阶段生成

section_form: sonata
# 曲式结构，仅 section_aware=true 时生效。
#   可选: sonata / rondo / aba / theme-variations / binary

section_total_bars: 64
# 段落感知生成的目标总小节数，仅 section_aware=true 时生效。
#   范围: 16 ~ 256 (默认: 64)

# ── 其他 ──────────────────────────────────────────────────────

seed_bars: 16
# 从输入文件末尾截取多少小节作为种子。
#   范围: 1 ~ 128 (默认: 16)
#   调高 → 模型有更多参考上下文
#   调低 → 模型更自由发挥

num_samples: 1
# 一次生成输出多少个独立变体。
#   范围: 1 ~ 10 (默认: 1)
#   调高 → 一次跑出多个版本供挑选

# target_key: C
# 目标调性（取消行首 # 启用）。
#   可选: C, G, D, A, E, B, F#, C#, F, Bb, Eb, Ab, Db, Gb, Cb
#   及对应小调 (Am, Em, Bm, ...)

random_seed: false
# 是否自动生成固定随机种子实现可复现结果。
#   true → 自动生成随机种子，每次相同输入生成相同结果（用于调试/对比）
#   false → 每次生成不同结果（默认）
#   注意：设为 true 时系统自动生成种子值，用户无需手动指定
